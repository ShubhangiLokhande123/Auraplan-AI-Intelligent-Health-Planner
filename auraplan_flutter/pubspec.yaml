name: auraplan_ai
description: AuraPlan AI — Your intelligent daily planner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView — full-featured, supports Web Speech API + Geolocation + mic
  flutter_inappwebview: ^6.1.5

  # AdMob
  google_mobile_ads: ^4.0.0

  # Android runtime permissions (mic, location)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/index.html
    - assets/logo.png
